version: 1
display_name: Bigscreen Generator
short_description: Generate Vue 3 plus ECharts big-screen projects from requirements, using template libraries only as style and layout references.
default_prompt: Generate a componentized Vue 3 plus Tailwind CSS plus ECharts big-screen page from my requirements or uploaded design image. If I upload a dashboard image, first analyze the image into a normalized prompt and concise blueprint summary, then scaffold maintainable sections, charts, mock data, Tailwind chrome helpers, and page docs while preserving reusable panel chrome rather than copying markup.
